services:
  - type: web
    name: vanlostandfound-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://mohammad-masoumi.github.io,http://localhost:5500,http://127.0.0.1:5500

databases:
  - name: vanlostandfound-db
